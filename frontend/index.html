<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 文字直播</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a1628;
    color: #e8eaf0;
    padding: 20px;
    min-height: 100vh;
  }
  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  h1 {
    color: #f0c040;
    font-size: 1.5rem;
    margin-bottom: 4px;
  }
  .sub {
    color: #8892a4;
    font-size: 0.85rem;
  }
  #status {
    text-align: center;
    padding: 8px;
    font-size: 0.8rem;
    color: #4caf50;
    margin-bottom: 16px;
    border-radius: 4px;
    background: rgba(76, 175, 80, 0.1);
  }
  #status.disconnected {
    color: #e04444;
    background: rgba(224, 68, 68, 0.1);
  }
  #feed {
    max-width: 640px;
    margin: 0 auto;
  }
  .card {
    background: #1a2744;
    border-left: 4px solid #3a6bcc;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 12px;
    animation: fadein 0.4s ease;
    transition: transform 0.2s;
  }
  .card:hover {
    transform: translateX(4px);
  }
  .card.GOAL {
    border-left-color: #f0c040;
    background: #1f2a10;
  }
  .card.RED_CARD {
    border-left-color: #e04444;
    background: #2a1010;
  }
  .card.YELLOW_CARD {
    border-left-color: #ffd54f;
  }
  .card.HALF_TIME, .card.FULL_TIME {
    border-left-color: #ab47bc;
    background: #1a1a2e;
  }
  .meta {
    font-size: 0.75rem;
    color: #8892a4;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .teams {
    font-weight: 500;
  }
  .score {
    font-weight: 700;
    color: #f0c040;
    font-size: 0.85rem;
  }
  .time-info {
    font-size: 0.7rem;
  }
  .commentary {
    font-size: 1rem;
    line-height: 1.6;
    margin-top: 4px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #5a6478;
  }
  .empty-state .icon {
    font-size: 3rem;
    margin-bottom: 12px;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 480px) {
    body { padding: 12px; }
    h1 { font-size: 1.2rem; }
    .card { padding: 10px 12px; }
  }
</style>
</head>
<body>
<div class="header">
  <h1>⚽ World Cup 2026 文字直播</h1>
  <div class="sub">由 Claude AI 实时生成解说词 · Kinesis → Lambda → DynamoDB → WebSocket</div>
</div>
<div id="status">连接中...</div>
<div id="feed">
  <div class="empty-state">
    <div class="icon">📡</div>
    <p>等待比赛事件...</p>
  </div>
</div>

<script>
  // Replace with your actual WebSocket URL after deployment
  const WS_URL = "wss://YOUR_API_ID.execute-api.us-west-2.amazonaws.com/prod";
  const feed = document.getElementById("feed");
  const statusEl = document.getElementById("status");
  let firstEvent = true;

  function connect() {
    statusEl.textContent = "连接中...";
    statusEl.className = "";

    const ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      statusEl.textContent = "🟢 已连接，等待比赛事件...";
      statusEl.className = "";
    };

    ws.onmessage = (e) => {
      const d = JSON.parse(e.data);

      // Clear empty state on first event
      if (firstEvent) {
        feed.innerHTML = "";
        firstEvent = false;
      }

      const card = document.createElement("div");
      card.className = `card ${d.type}`;
      card.innerHTML = `
        <div class="meta">
          <span class="teams">${d.home} <span class="score">${d.score}</span> ${d.away}</span>
          <span class="time-info">第${d.minute}分钟 · ${new Date().toLocaleTimeString('zh-CN')}</span>
        </div>
        <div class="commentary">${d.commentary}</div>`;
      feed.prepend(card);

      // Keep max 50 cards
      while (feed.children.length > 50) {
        feed.removeChild(feed.lastChild);
      }
    };

    ws.onclose = () => {
      statusEl.textContent = "🔴 连接断开，5秒后重连...";
      statusEl.className = "disconnected";
      setTimeout(connect, 5000);
    };

    ws.onerror = () => {
      statusEl.textContent = "🔴 连接错误";
      statusEl.className = "disconnected";
    };
  }

  connect();
</script>
</body>
</html>
